worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Tối ưu tốc độ load
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen       81;
        server_name  172.16.65.10;

        # 1. API Backend
        location /api {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Tăng thời gian chờ cho các tác vụ AI nặng
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # 2. SSE (Real-time Logs Terminal)
        location /api/logs/stream {
            proxy_pass http://localhost:3000/api/logs/stream;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # 3. Ảnh Uploads
        location /uploads {
            proxy_pass http://localhost:3000;
        }

        # 4. Frontend Static (Dashboard)
        location / {
            root "D:/I2FLabs/Projects/Alice/frontend/dist";
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Trang lỗi
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
